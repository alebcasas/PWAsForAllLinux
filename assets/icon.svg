<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main window shape -->
  <rect x="20" y="25" width="88" height="65" rx="8" fill="white" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Window header -->
  <rect x="20" y="25" width="88" height="15" rx="8" fill="url(#grad1)"/>
  <rect x="20" y="32" width="88" height="8" fill="url(#grad1)"/>
  
  <!-- Window buttons -->
  <circle cx="32" cy="32" r="3" fill="#ef4444"/>
  <circle cx="42" cy="32" r="3" fill="#f59e0b"/>
  <circle cx="52" cy="32" r="3" fill="#10b981"/>
  
  <!-- PWA icon (browser) -->
  <rect x="35" y="50" width="58" height="35" rx="4" fill="url(#grad2)" opacity="0.2"/>
  <rect x="38" y="53" width="52" height="29" rx="2" fill="white"/>
  
  <!-- Browser content lines -->
  <rect x="42" y="58" width="30" height="3" rx="1" fill="#94a3b8"/>
  <rect x="42" y="64" width="44" height="2" rx="1" fill="#cbd5e1"/>
  <rect x="42" y="69" width="40" height="2" rx="1" fill="#cbd5e1"/>
  <rect x="42" y="74" width="35" height="2" rx="1" fill="#cbd5e1"/>
  
  <!-- Plus icon (add PWA) -->
  <circle cx="95" cy="85" r="12" fill="url(#grad2)"/>
  <rect x="91" y="82" width="8" height="2" rx="1" fill="white"/>
  <rect x="94" y="79" width="2" height="8" rx="1" fill="white"/>
  
  <!-- Decorative dots -->
  <circle cx="25" cy="95" r="2" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="30" cy="100" r="1.5" fill="url(#grad2)" opacity="0.5"/>
  <circle cx="35" cy="95" r="2" fill="url(#grad1)" opacity="0.5"/>
</svg>
